name: Build and Push Docker Image
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version and owner
        id: version
        run: |
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.version.outputs.owner }}/dnsdist-sidecar:latest
            ghcr.io/${{ steps.version.outputs.owner }}/dnsdist-sidecar:${{ github.ref_name }}
            ghcr.io/${{ steps.version.outputs.owner }}/dnsdist-sidecar:${{ steps.version.outputs.version }}
