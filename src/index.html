<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dnsdist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: fit-content; }
    body { font-family: 'Inter', sans-serif; background-color: #333235; }
  </style>
</head>
<body class="text-zinc-100">
  <div id="root"></div>
  <script>
    // Resolves the active layout tier.
    // configLayout: 'auto' | 'detail' | 'compact' (from config.json via /data)
    // Returns 'detail' (3-col + stats) or 'compact' (1-col, no stats).
    // In 'auto' mode the threshold is 3 cards × 270px min-width + 2 gaps × 12px = 834px.
    function getLayout(width, configLayout) {
      if (configLayout === 'detail') return 'detail';
      if (configLayout === 'compact') return 'compact';
      return width >= 834 ? 'detail' : 'compact';
    }

    function stripPort(address) {
      return address.replace(/:\d+$/, '');
    }

    const ESC = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    function esc(s) { return String(s).replace(/[&<>"']/g, c => ESC[c]); }

    function stateBadge(state) {
      return state === 'up'
        ? '<span class="px-2 py-0.5 rounded text-xs font-medium bg-green-500/20 text-green-400">Up</span>'
        : '<span class="px-2 py-0.5 rounded text-xs font-medium bg-red-500/20 text-red-400">Down</span>';
    }

    function iconWrapper(src) {
      return `<div class="w-9 h-9 flex items-center justify-center shrink-0">
        <img src="${src}" class="w-full h-full object-contain" alt="">
      </div>`;
    }

    // Renders the query/response stats grid, shown only in detail layout.
    function statsRow(queries, responses) {
      return `
        <div class="grid grid-cols-2 gap-1 mt-3 text-xs">
          <div><div class="text-zinc-500 mb-0.5">Queries</div><div class="text-sm text-zinc-200">${queries.toLocaleString()}</div></div>
          <div><div class="text-zinc-500 mb-0.5">Responses</div><div class="text-sm text-zinc-200">${responses.toLocaleString()}</div></div>
        </div>`;
    }

    // Primary server card (Pi-hole). Renders as a link if a pihole href is configured.
    function primaryCard(server, pihole1Href, pihole2Href, showStats, icon) {
      const ip = stripPort(server.address);
      const href = server.order === 1 ? pihole1Href : server.order === 2 ? pihole2Href : null;

      const inner = `
        <div class="flex items-start gap-3">
          ${iconWrapper(icon)}
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between mb-1">
              <span class="font-medium text-zinc-200">${esc(server.name)}</span>
              ${stateBadge(server.state)}
            </div>
            <div class="text-xs text-zinc-400 font-mono">${esc(ip)}</div>
          </div>
        </div>
        ${showStats ? statsRow(server.queries, server.responses) : ''}`;

      if (href) {
        return `<a href="${href}" target="_blank" rel="noopener noreferrer" class="block bg-zinc-800 rounded-lg p-3 text-zinc-100 hover:bg-zinc-700 transition-colors">${inner}</a>`;
      }
      return `<div class="bg-zinc-800 rounded-lg p-3">${inner}</div>`;
    }

    // Fallback/cloud card — aggregates all fallback resolvers into a single card.
    // State is 'up' if at least one fallback is up, 'down' if all are down.
    function fallbackCard(fallbacks, showStats, icon) {
      const totalQueries = fallbacks.reduce((sum, s) => sum + s.queries, 0);
      const totalResponses = fallbacks.reduce((sum, s) => sum + s.responses, 0);
      const state = fallbacks.some(s => s.state === 'up') ? 'up' : 'down';
      const ipList = `<div class="text-xs text-zinc-400 font-mono">${fallbacks.map(s => esc(stripPort(s.address))).join(', ')}</div>`;

      return `
        <div class="bg-zinc-800 rounded-lg p-3">
          <div class="flex items-start gap-3">
            ${iconWrapper(icon)}
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between mb-1">
                <span class="font-medium text-zinc-200">Cloud Failover</span>
                ${stateBadge(state)}
              </div>
              ${ipList}
            </div>
          </div>
          ${showStats ? statsRow(totalQueries, totalResponses) : ''}
        </div>`;
    }

    const root = document.getElementById('root');

    // Tracks the current layout tier so the ResizeObserver can avoid
    // re-rendering when the tier hasn't actually changed.
    let currentLayout = 'detail';

    function render(primaries, fallbacks, config) {
      // Re-evaluate layout on every render so config changes picked up from
      // /data are applied immediately, not just on the next resize event.
      currentLayout = getLayout(root.offsetWidth, config.layout);
      const detail = currentLayout === 'detail';
      const cols = detail ? 3 : 1;

      const hasPrimaries = primaries && primaries.length > 0;
      const hasFallbacks = fallbacks && fallbacks.length > 0;

      if (!hasPrimaries && !hasFallbacks) {
        root.innerHTML = '';
        return;
      }

      root.innerHTML = `
        <div class="grid grid-cols-${cols} gap-3">
          ${hasPrimaries ? primaries.map(s => primaryCard(s, config.pihole1Href, config.pihole2Href, detail, s.order === 1 ? config.primaryServerIcon : config.secondaryServerIcon)).join('\n') : ''}
          ${hasFallbacks ? fallbackCard(fallbacks, detail, config.failoverServerIcon) : ''}
        </div>`;
    }

    let cachedPrimaries = null;
    let cachedFallbacks = null;
    let lastConfig = {
      pihole1Href: '#', pihole2Href: '#', refreshInterval: 20000, layout: 'auto',
      primaryServerIcon: null, secondaryServerIcon: null, failoverServerIcon: null,
    };
    let refreshTimer = null;

    // Fetches fresh data from /data and re-renders. On error the last known
    // server state is preserved so the UI doesn't go blank on a transient failure.
    async function load() {
      try {
        const res = await fetch('/data');
        const data = await res.json();

        lastConfig = {
          pihole1Href: data.pihole1Href,
          pihole2Href: data.pihole2Href,
          refreshInterval: data.refreshInterval,
          layout: data.layout,
          primaryServerIcon: data.primaryServerIcon,
          secondaryServerIcon: data.secondaryServerIcon,
          failoverServerIcon: data.failoverServerIcon,
        };

        if (data.primaries !== null) {
          cachedPrimaries = data.primaries;
          cachedFallbacks = data.fallbacks;
        }

        render(cachedPrimaries, cachedFallbacks, lastConfig);
      } catch (err) {
        console.error('Failed to fetch /data:', err);
        render(cachedPrimaries, cachedFallbacks, lastConfig);
      } finally {
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(load, lastConfig.refreshInterval);
      }
    }

    // Re-renders when the container crosses the detail/compact threshold.
    // Only fires when the layout tier actually changes, not on every resize event.
    const observer = new ResizeObserver(([entry]) => {
      const newLayout = getLayout(entry.contentRect.width, lastConfig.layout);
      if (newLayout !== currentLayout) {
        render(cachedPrimaries, cachedFallbacks, lastConfig);
      }
    });
    observer.observe(root);

    load();
  </script>
</body>
</html>
